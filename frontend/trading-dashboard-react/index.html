<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trading Dashboard - Foundation Ready</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7f4;
        color: #172033;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(760px, calc(100% - 48px));
        border-left: 4px solid #b85c38;
        padding: 32px;
        background: #ffffff;
        box-shadow: 0 16px 48px rgb(21 31 48 / 10%);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.75rem, 4vw, 3rem);
        line-height: 1.1;
        letter-spacing: 0;
      }

      p {
        margin: 16px 0 0;
        color: #526070;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Trading Dashboard - Foundation Ready</h1>
      <p>v0.1.0 foundation placeholder</p>
    </main>
  </body>
</html>
