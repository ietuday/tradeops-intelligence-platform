{{- if .Values.secrets.createExample }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.config.jwtSecretRef }}
  namespace: {{ include "tradeops.namespace" . }}
  labels:
    {{- include "tradeops.labels" . | nindent 4 }}
    tradeops.io/secret-type: example-placeholder
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
{{- end }}

