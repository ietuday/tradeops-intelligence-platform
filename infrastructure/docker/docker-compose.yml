services:
  api-gateway:
    build:
      context: ../../services/api-gateway
      dockerfile: Dockerfile
    image: tradeops/api-gateway:0.1.0
    container_name: tradeops-api-gateway
    environment:
      NODE_ENV: production
      PORT: 8080
      LOG_LEVEL: info
      IDENTITY_SERVICE_URL: ${IDENTITY_SERVICE_URL:-http://identity-service:8080}
      MARKET_DATA_SERVICE_URL: ${MARKET_DATA_SERVICE_URL:-http://market-data-service:8080}
      ORDER_SERVICE_URL: ${ORDER_SERVICE_URL:-http://order-service:8080}
      PORTFOLIO_SERVICE_URL: ${PORTFOLIO_SERVICE_URL:-http://portfolio-service:8080}
      STRATEGY_SERVICE_URL: ${STRATEGY_SERVICE_URL:-http://strategy-service:8080}
      RISK_SERVICE_URL: ${RISK_SERVICE_URL:-http://risk-engine-service:8080}
      SURVEILLANCE_SERVICE_URL: ${SURVEILLANCE_SERVICE_URL:-http://surveillance-service:8090}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification-service:8091}
      AUDIT_SERVICE_URL: ${AUDIT_SERVICE_URL:-http://audit-service:8092}
      PROXY_TIMEOUT_MS: ${PROXY_TIMEOUT_MS:-10000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4200,http://localhost:4300}
      REQUEST_BODY_LIMIT: ${REQUEST_BODY_LIMIT:-1mb}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-300}
    ports:
      - "8080:8080"
    depends_on:
      identity-service:
        condition: service_healthy
      market-data-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      portfolio-service:
        condition: service_healthy
      strategy-service:
        condition: service_healthy
      risk-engine-service:
        condition: service_healthy
      surveillance-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tradeops-net

  identity-service:
    build:
      context: ../../services/identity-service
      dockerfile: Dockerfile
    image: tradeops/identity-service:0.2.0
    container_name: tradeops-identity-service
    environment:
      IDENTITY_SERVICE_PORT: ${IDENTITY_SERVICE_PORT:-8080}
      IDENTITY_DATABASE_URL: ${IDENTITY_DATABASE_URL:?IDENTITY_DATABASE_URL is required. Create infrastructure/docker/.env from .env.example}
      IDENTITY_REDIS_ADDR: ${IDENTITY_REDIS_ADDR:-redis:6379}
      IDENTITY_JWT_SECRET: ${IDENTITY_JWT_SECRET:?IDENTITY_JWT_SECRET is required. Create infrastructure/docker/.env from .env.example}
      IDENTITY_REFRESH_TOKEN_SECRET: ${IDENTITY_REFRESH_TOKEN_SECRET:?IDENTITY_REFRESH_TOKEN_SECRET is required. Create infrastructure/docker/.env from .env.example}
      IDENTITY_ACCESS_TOKEN_TTL_MINUTES: ${IDENTITY_ACCESS_TOKEN_TTL_MINUTES:-15}
      IDENTITY_REFRESH_TOKEN_TTL_HOURS: ${IDENTITY_REFRESH_TOKEN_TTL_HOURS:-24}
    ports:
      - "8084:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tradeops-net

  market-data-service:
    build:
      context: ../../services/market-data-service
      dockerfile: Dockerfile
    image: tradeops/market-data-service:0.3.0
    container_name: tradeops-market-data-service
    environment:
      MARKET_DATA_SERVICE_PORT: ${MARKET_DATA_SERVICE_PORT:-8080}
      MARKET_DATA_DATABASE_URL: ${MARKET_DATA_DATABASE_URL:-postgres://${POSTGRES_USER:-tradeops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tradeops}?sslmode=disable}
      MARKET_DATA_MQTT_BROKER: ${MARKET_DATA_MQTT_BROKER:-tcp://mosquitto:1883}
      MARKET_DATA_MQTT_TOPIC: ${MARKET_DATA_MQTT_TOPIC:-market/+/tick}
      MARKET_DATA_KAFKA_BROKERS: ${MARKET_DATA_KAFKA_BROKERS:-redpanda:29092}
      MARKET_DATA_KAFKA_TOPIC: ${MARKET_DATA_KAFKA_TOPIC:-market.ticks}
      MARKET_SIMULATOR_ENABLED: ${MARKET_SIMULATOR_ENABLED:-true}
      MARKET_SIMULATOR_INTERVAL_MS: ${MARKET_SIMULATOR_INTERVAL_MS:-1000}
    ports:
      - "8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
      redpanda:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tradeops-net

  order-service:
    build:
      context: ../../services/order-service
      dockerfile: Dockerfile
    image: tradeops/order-service:0.4.0
    container_name: tradeops-order-service
    environment:
      ORDER_SERVICE_PORT: ${ORDER_SERVICE_PORT:-8080}
      ORDER_DATABASE_URL: ${ORDER_DATABASE_URL:-postgres://${POSTGRES_USER:-tradeops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tradeops}?sslmode=disable}
      ORDER_KAFKA_BROKERS: ${ORDER_KAFKA_BROKERS:-redpanda:29092}
      ORDER_JWT_SECRET: ${ORDER_JWT_SECRET:-${IDENTITY_JWT_SECRET}}
    ports:
      - "8086:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tradeops-net

  portfolio-service:
    build:
      context: ../../services/portfolio-service
      dockerfile: Dockerfile
    image: tradeops/portfolio-service:0.5.0
    container_name: tradeops-portfolio-service
    environment:
      PORTFOLIO_SERVICE_PORT: ${PORTFOLIO_SERVICE_PORT:-8080}
      PORTFOLIO_DATABASE_URL: ${PORTFOLIO_DATABASE_URL:-postgres://${POSTGRES_USER:-tradeops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tradeops}?sslmode=disable}
      PORTFOLIO_KAFKA_BROKERS: ${PORTFOLIO_KAFKA_BROKERS:-redpanda:29092}
      PORTFOLIO_ORDER_FILLED_TOPIC: ${PORTFOLIO_ORDER_FILLED_TOPIC:-order.filled}
      PORTFOLIO_UPDATED_TOPIC: ${PORTFOLIO_UPDATED_TOPIC:-portfolio.updated}
      PORTFOLIO_SNAPSHOT_TOPIC: ${PORTFOLIO_SNAPSHOT_TOPIC:-portfolio.snapshot.created}
      PORTFOLIO_JWT_SECRET: ${PORTFOLIO_JWT_SECRET:-${IDENTITY_JWT_SECRET}}
      PORTFOLIO_INITIAL_CASH: ${PORTFOLIO_INITIAL_CASH:-100000}
      EVENT_PROCESSING_MAX_RETRIES: ${EVENT_PROCESSING_MAX_RETRIES:-3}
      EVENT_PROCESSING_RETRY_BACKOFF_MS: ${EVENT_PROCESSING_RETRY_BACKOFF_MS:-500}
      EVENT_PROCESSING_RETRY_BACKOFF_MULTIPLIER: ${EVENT_PROCESSING_RETRY_BACKOFF_MULTIPLIER:-2}
    ports:
      - "8087:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tradeops-net

  strategy-service:
    build:
      context: ../../services/strategy-service
      dockerfile: Dockerfile
    image: tradeops/strategy-service:0.6.0
    container_name: tradeops-strategy-service
    environment:
      STRATEGY_SERVICE_PORT: ${STRATEGY_SERVICE_PORT:-8080}
      STRATEGY_DATABASE_URL: ${STRATEGY_DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-tradeops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tradeops}}
      STRATEGY_KAFKA_BROKERS: ${STRATEGY_KAFKA_BROKERS:-redpanda:29092}
      STRATEGY_SIGNAL_TOPIC: ${STRATEGY_SIGNAL_TOPIC:-strategy.signal.generated}
      STRATEGY_BACKTEST_COMPLETED_TOPIC: ${STRATEGY_BACKTEST_COMPLETED_TOPIC:-strategy.backtest.completed}
      STRATEGY_JWT_SECRET: ${STRATEGY_JWT_SECRET:-${IDENTITY_JWT_SECRET}}
    ports:
      - "8088:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tradeops-net

  risk-engine-service:
    build:
      context: ../../services/risk-engine-service
      dockerfile: Dockerfile
    image: tradeops/risk-engine-service:0.7.0
    container_name: tradeops-risk-engine-service
    environment:
      RISK_SERVICE_PORT: ${RISK_SERVICE_PORT:-8080}
      RISK_DATABASE_URL: ${RISK_DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-tradeops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tradeops}}
      RISK_KAFKA_BROKERS: ${RISK_KAFKA_BROKERS:-redpanda:29092}
      RISK_JWT_SECRET: ${RISK_JWT_SECRET:-${IDENTITY_JWT_SECRET}}
      RISK_SCORE_UPDATED_TOPIC: ${RISK_SCORE_UPDATED_TOPIC:-risk.score.updated}
      RISK_BREACHED_TOPIC: ${RISK_BREACHED_TOPIC:-risk.breached}
      RISK_ANOMALY_TOPIC: ${RISK_ANOMALY_TOPIC:-risk.anomaly.detected}
      RISK_RECOMMENDATION_TOPIC: ${RISK_RECOMMENDATION_TOPIC:-risk.recommendation.created}
    ports:
      - "8089:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tradeops-net

  surveillance-service:
    build:
      context: ../../services/surveillance-service
      dockerfile: Dockerfile
    image: tradeops/surveillance-service:0.8.0
    container_name: tradeops-surveillance-service
    environment:
      SURVEILLANCE_SERVICE_PORT: ${SURVEILLANCE_SERVICE_PORT:-8090}
      SURVEILLANCE_DATABASE_URL: ${SURVEILLANCE_DATABASE_URL:-postgres://${POSTGRES_USER:-tradeops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tradeops}?sslmode=disable}
      SURVEILLANCE_KAFKA_BROKERS: ${SURVEILLANCE_KAFKA_BROKERS:-redpanda:29092}
      SURVEILLANCE_KAFKA_TOPICS: ${SURVEILLANCE_KAFKA_TOPICS:-order.created,order.filled,order.cancelled,portfolio.updated,risk.score.updated,market.ticks,strategy.signal.generated}
      SURVEILLANCE_JWT_SECRET: ${SURVEILLANCE_JWT_SECRET:-${IDENTITY_JWT_SECRET}}
      SURVEILLANCE_LARGE_ORDER_THRESHOLD: ${SURVEILLANCE_LARGE_ORDER_THRESHOLD:-100000}
      SURVEILLANCE_RAPID_ORDER_LIMIT: ${SURVEILLANCE_RAPID_ORDER_LIMIT:-5}
      SURVEILLANCE_RAPID_ORDER_WINDOW_SECONDS: ${SURVEILLANCE_RAPID_ORDER_WINDOW_SECONDS:-60}
      SURVEILLANCE_HIGH_CANCEL_LIMIT: ${SURVEILLANCE_HIGH_CANCEL_LIMIT:-3}
      SURVEILLANCE_HIGH_CANCEL_WINDOW_SECONDS: ${SURVEILLANCE_HIGH_CANCEL_WINDOW_SECONDS:-300}
      SURVEILLANCE_RISK_SCORE_THRESHOLD: ${SURVEILLANCE_RISK_SCORE_THRESHOLD:-80}
      SURVEILLANCE_ABNORMAL_PRICE_MOVEMENT_PERCENT: ${SURVEILLANCE_ABNORMAL_PRICE_MOVEMENT_PERCENT:-10}
      EVENT_PROCESSING_MAX_RETRIES: ${EVENT_PROCESSING_MAX_RETRIES:-3}
      EVENT_PROCESSING_RETRY_BACKOFF_MS: ${EVENT_PROCESSING_RETRY_BACKOFF_MS:-500}
      EVENT_PROCESSING_RETRY_BACKOFF_MULTIPLIER: ${EVENT_PROCESSING_RETRY_BACKOFF_MULTIPLIER:-2}
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tradeops-net

  notification-service:
    build:
      context: ../../services/notification-service
      dockerfile: Dockerfile
    image: tradeops/notification-service:0.9.0
    container_name: tradeops-notification-service
    environment:
      NOTIFICATION_SERVICE_PORT: ${NOTIFICATION_SERVICE_PORT:-8091}
      NOTIFICATION_DATABASE_URL: ${NOTIFICATION_DATABASE_URL:-postgres://${POSTGRES_USER:-tradeops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tradeops}?sslmode=disable}
      NOTIFICATION_JWT_SECRET: ${NOTIFICATION_JWT_SECRET:-${IDENTITY_JWT_SECRET}}
      NOTIFICATION_KAFKA_BROKERS: ${NOTIFICATION_KAFKA_BROKERS:-redpanda:29092}
      NOTIFICATION_KAFKA_TOPICS: ${NOTIFICATION_KAFKA_TOPICS:-surveillance.alert.created,surveillance.alert.acknowledged,surveillance.alert.resolved,surveillance.alert.dismissed}
      NOTIFICATION_WEBHOOK_TIMEOUT_SECONDS: ${NOTIFICATION_WEBHOOK_TIMEOUT_SECONDS:-3}
      NOTIFICATION_WEBHOOK_MAX_RETRIES: ${NOTIFICATION_WEBHOOK_MAX_RETRIES:-3}
      EVENT_PROCESSING_MAX_RETRIES: ${EVENT_PROCESSING_MAX_RETRIES:-3}
      EVENT_PROCESSING_RETRY_BACKOFF_MS: ${EVENT_PROCESSING_RETRY_BACKOFF_MS:-500}
      EVENT_PROCESSING_RETRY_BACKOFF_MULTIPLIER: ${EVENT_PROCESSING_RETRY_BACKOFF_MULTIPLIER:-2}
    ports:
      - "8091:8091"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8091/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tradeops-net

  audit-service:
    build:
      context: ../../services/audit-service
      dockerfile: Dockerfile
    image: tradeops/audit-service:1.3.0
    container_name: tradeops-audit-service
    environment:
      SERVICE_NAME: audit-service
      PORT: ${AUDIT_SERVICE_PORT:-8092}
      DATABASE_URL: ${AUDIT_DATABASE_URL:-postgres://${POSTGRES_USER:-tradeops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tradeops}?sslmode=disable}
      JWT_SECRET: ${AUDIT_JWT_SECRET:-${IDENTITY_JWT_SECRET}}
      KAFKA_BROKERS: ${AUDIT_KAFKA_BROKERS:-redpanda:29092}
      KAFKA_GROUP_ID: ${AUDIT_KAFKA_GROUP_ID:-audit-service}
      AUDIT_KAFKA_TOPICS: ${AUDIT_KAFKA_TOPICS:-user.registered,user.login,user.logout,order.created,order.cancelled,order.filled,portfolio.updated,risk.score.updated,risk.breached,surveillance.alert.created,surveillance.alert.acknowledged,surveillance.alert.resolved,surveillance.alert.dismissed,notification.read,notification.failed,notification.sent,notification.retry_requested}
      EVENT_PROCESSING_MAX_RETRIES: ${EVENT_PROCESSING_MAX_RETRIES:-3}
      EVENT_PROCESSING_RETRY_BACKOFF_MS: ${EVENT_PROCESSING_RETRY_BACKOFF_MS:-500}
      EVENT_PROCESSING_RETRY_BACKOFF_MULTIPLIER: ${EVENT_PROCESSING_RETRY_BACKOFF_MULTIPLIER:-2}
    ports:
      - "8092:8092"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8092/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tradeops-net

  postgres:
    image: postgres:16.2-alpine3.19
    container_name: tradeops-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tradeops}
      POSTGRES_USER: ${POSTGRES_USER:-tradeops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Create infrastructure/docker/.env from .env.example}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-tradeops} -d $${POSTGRES_DB:-tradeops}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tradeops-net

  redis:
    image: redis:7.2.4-alpine3.19
    container_name: tradeops-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tradeops-net

  mosquitto:
    image: eclipse-mosquitto:2.0.18
    container_name: tradeops-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - tradeops-net

  redpanda:
    image: redpandadata/redpanda:v24.1.6
    container_name: tradeops-redpanda
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:9092
      - --pandaproxy-addr=internal://0.0.0.0:28082,external://0.0.0.0:8082
      - --advertise-pandaproxy-addr=internal://redpanda:28082,external://localhost:8082
      - --schema-registry-addr=internal://0.0.0.0:28081,external://0.0.0.0:8083
    ports:
      - "9092:9092"
      - "8082:8082"
      - "8083:8083"
    networks:
      - tradeops-net

  redpanda-console:
    image: redpandadata/console:v2.4.5
    container_name: tradeops-redpanda-console
    depends_on:
      - redpanda
    environment:
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8081:8080"
    networks:
      - tradeops-net

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: tradeops-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
    networks:
      - tradeops-net

  grafana:
    image: grafana/grafana:10.4.1
    container_name: tradeops-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required. Create infrastructure/docker/.env from .env.example}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - tradeops-net

  shell-angular:
    build:
      context: ../../frontend/shell-angular
      dockerfile: Dockerfile
    image: tradeops/shell-angular:0.1.0
    container_name: tradeops-shell-angular
    ports:
      - "4200:8080"
    networks:
      - tradeops-net

  trading-dashboard-react:
    build:
      context: ../../frontend/trading-dashboard-react
      dockerfile: Dockerfile
    image: tradeops/trading-dashboard-react:0.1.0
    container_name: tradeops-trading-dashboard-react
    ports:
      - "4300:8080"
    networks:
      - tradeops-net

networks:
  tradeops-net:
    name: tradeops-net
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  grafana-data:
