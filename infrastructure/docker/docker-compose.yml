services:
  api-gateway:
    build:
      context: ../../services/api-gateway
      dockerfile: Dockerfile
    image: tradeops/api-gateway:0.1.0
    container_name: tradeops-api-gateway
    environment:
      NODE_ENV: production
      PORT: 8080
      LOG_LEVEL: info
      IDENTITY_SERVICE_URL: ${IDENTITY_SERVICE_URL:-http://identity-service:8080}
      MARKET_DATA_SERVICE_URL: ${MARKET_DATA_SERVICE_URL:-http://market-data-service:8080}
      ORDER_SERVICE_URL: ${ORDER_SERVICE_URL:-http://order-service:8080}
    ports:
      - "8080:8080"
    depends_on:
      identity-service:
        condition: service_healthy
      market-data-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tradeops-net

  identity-service:
    build:
      context: ../../services/identity-service
      dockerfile: Dockerfile
    image: tradeops/identity-service:0.2.0
    container_name: tradeops-identity-service
    environment:
      IDENTITY_SERVICE_PORT: ${IDENTITY_SERVICE_PORT:-8080}
      IDENTITY_DATABASE_URL: ${IDENTITY_DATABASE_URL:?IDENTITY_DATABASE_URL is required. Create infrastructure/docker/.env from .env.example}
      IDENTITY_REDIS_ADDR: ${IDENTITY_REDIS_ADDR:-redis:6379}
      IDENTITY_JWT_SECRET: ${IDENTITY_JWT_SECRET:?IDENTITY_JWT_SECRET is required. Create infrastructure/docker/.env from .env.example}
      IDENTITY_REFRESH_TOKEN_SECRET: ${IDENTITY_REFRESH_TOKEN_SECRET:?IDENTITY_REFRESH_TOKEN_SECRET is required. Create infrastructure/docker/.env from .env.example}
      IDENTITY_ACCESS_TOKEN_TTL_MINUTES: ${IDENTITY_ACCESS_TOKEN_TTL_MINUTES:-15}
      IDENTITY_REFRESH_TOKEN_TTL_HOURS: ${IDENTITY_REFRESH_TOKEN_TTL_HOURS:-24}
    ports:
      - "8084:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tradeops-net

  market-data-service:
    build:
      context: ../../services/market-data-service
      dockerfile: Dockerfile
    image: tradeops/market-data-service:0.3.0
    container_name: tradeops-market-data-service
    environment:
      MARKET_DATA_SERVICE_PORT: ${MARKET_DATA_SERVICE_PORT:-8080}
      MARKET_DATA_DATABASE_URL: ${MARKET_DATA_DATABASE_URL:-postgres://${POSTGRES_USER:-tradeops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tradeops}?sslmode=disable}
      MARKET_DATA_MQTT_BROKER: ${MARKET_DATA_MQTT_BROKER:-tcp://mosquitto:1883}
      MARKET_DATA_MQTT_TOPIC: ${MARKET_DATA_MQTT_TOPIC:-market/+/tick}
      MARKET_DATA_KAFKA_BROKERS: ${MARKET_DATA_KAFKA_BROKERS:-redpanda:29092}
      MARKET_DATA_KAFKA_TOPIC: ${MARKET_DATA_KAFKA_TOPIC:-market.ticks}
      MARKET_SIMULATOR_ENABLED: ${MARKET_SIMULATOR_ENABLED:-true}
      MARKET_SIMULATOR_INTERVAL_MS: ${MARKET_SIMULATOR_INTERVAL_MS:-1000}
    ports:
      - "8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
      redpanda:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tradeops-net

  order-service:
    build:
      context: ../../services/order-service
      dockerfile: Dockerfile
    image: tradeops/order-service:0.4.0
    container_name: tradeops-order-service
    environment:
      ORDER_SERVICE_PORT: ${ORDER_SERVICE_PORT:-8080}
      ORDER_DATABASE_URL: ${ORDER_DATABASE_URL:-postgres://${POSTGRES_USER:-tradeops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tradeops}?sslmode=disable}
      ORDER_KAFKA_BROKERS: ${ORDER_KAFKA_BROKERS:-redpanda:29092}
      ORDER_JWT_SECRET: ${ORDER_JWT_SECRET:-${IDENTITY_JWT_SECRET}}
    ports:
      - "8086:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tradeops-net

  postgres:
    image: postgres:16.2-alpine3.19
    container_name: tradeops-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tradeops}
      POSTGRES_USER: ${POSTGRES_USER:-tradeops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Create infrastructure/docker/.env from .env.example}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-tradeops} -d $${POSTGRES_DB:-tradeops}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tradeops-net

  redis:
    image: redis:7.2.4-alpine3.19
    container_name: tradeops-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tradeops-net

  mosquitto:
    image: eclipse-mosquitto:2.0.18
    container_name: tradeops-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - tradeops-net

  redpanda:
    image: redpandadata/redpanda:v24.1.6
    container_name: tradeops-redpanda
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:9092
      - --pandaproxy-addr=internal://0.0.0.0:28082,external://0.0.0.0:8082
      - --advertise-pandaproxy-addr=internal://redpanda:28082,external://localhost:8082
      - --schema-registry-addr=internal://0.0.0.0:28081,external://0.0.0.0:8083
    ports:
      - "9092:9092"
      - "8082:8082"
      - "8083:8083"
    networks:
      - tradeops-net

  redpanda-console:
    image: redpandadata/console:v2.4.5
    container_name: tradeops-redpanda-console
    depends_on:
      - redpanda
    environment:
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8081:8080"
    networks:
      - tradeops-net

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: tradeops-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - tradeops-net

  grafana:
    image: grafana/grafana:10.4.1
    container_name: tradeops-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required. Create infrastructure/docker/.env from .env.example}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - tradeops-net

  shell-angular:
    build:
      context: ../../frontend/shell-angular
      dockerfile: Dockerfile
    image: tradeops/shell-angular:0.1.0
    container_name: tradeops-shell-angular
    ports:
      - "4200:8080"
    networks:
      - tradeops-net

  trading-dashboard-react:
    build:
      context: ../../frontend/trading-dashboard-react
      dockerfile: Dockerfile
    image: tradeops/trading-dashboard-react:0.1.0
    container_name: tradeops-trading-dashboard-react
    ports:
      - "4300:8080"
    networks:
      - tradeops-net

networks:
  tradeops-net:
    name: tradeops-net
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  grafana-data:
