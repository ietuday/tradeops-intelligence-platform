global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - api-gateway:8080

  - job_name: identity-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - identity-service:8080

  - job_name: market-data-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - market-data-service:8080

  - job_name: order-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - order-service:8080
