global:
  environment: local
  imageRegistry: ""
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []
  defaultTenantId: default-tenant
  tenantEnforcementEnabled: "true"
  terminationGracePeriodSeconds: 30

namespace:
  create: true
  name: tradeops
  labels:
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
  resourceQuota:
    enabled: false
    hard: {}
  limitRange:
    enabled: false
    limits: []

serviceAccount:
  create: true
  name: ""

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

scheduling:
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  priorityClassName: ""

secrets:
  existingSecretName: ""
  create: true
  allowInlineValues: true
  inline:
    POSTGRES_PASSWORD: tradeops_dev
    JWT_SECRET: local_dev_jwt_secret_change_me_123456789
    IDENTITY_REFRESH_TOKEN_SECRET: local_dev_refresh_secret_change_me_123456789
    GRAFANA_ADMIN_PASSWORD: admin

externalSecrets:
  enabled: false
  refreshInterval: 1h
  secretStoreRef:
    name: ""
    kind: ClusterSecretStore
  data: []

postgresql:
  mode: local
  port: 5432
  sslMode: disable
  databaseUrlOverride: ""
  pythonDatabaseUrlOverride: ""
  auth:
    database: tradeops
    username: tradeops
  external:
    host: ""
  local:
    image: postgres:16.2-alpine3.19
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi

redis:
  mode: local
  port: 6379
  external:
    host: ""
  local:
    image: redis:7.2.4-alpine3.19
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi

kafka:
  mode: local
  external:
    brokers: ""
  local:
    image: redpandadata/redpanda:v24.1.6
    resources:
      requests:
        cpu: 250m
        memory: 768Mi
      limits:
        cpu: "1"
        memory: 1Gi

mqtt:
  mode: local
  external:
    brokerUrl: ""
  local:
    image: eclipse-mosquitto:2.0.18
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi

apiGateway:
  corsOrigins:
    - http://localhost:4200
    - http://localhost:4300
    - http://localhost:5173
  proxyTimeoutMs: "10000"
  requestBodyLimit: 1mb
  admin:
    enabled: "true"
    healthTimeoutMs: "1500"
    serviceRegistryMode: static
  rateLimit:
    windowMs: "60000"
    maxRequests: "300"
  websocket:
    enabled: "true"
    requireAuth: "true"
    kafkaGroupId: api-gateway-websocket
    allowedOrigins:
      - http://localhost:4200
      - http://localhost:4300
      - http://localhost:5173
    maxConnections: "100"
    heartbeatIntervalMs: "30000"

eventProcessing:
  maxRetries: "3"
  retryBackoffMs: "500"
  retryBackoffMultiplier: "2"

marketData:
  mqttTopic: market/+/tick
  kafkaTopic: market.ticks
  simulator:
    enabled: "true"
    intervalMs: "1000"

portfolio:
  initialCash: "100000"
  topics:
    orderFilled: order.filled
    updated: portfolio.updated
    snapshotCreated: portfolio.snapshot.created

strategy:
  topics:
    signalGenerated: strategy.signal.generated
    backtestCompleted: strategy.backtest.completed

risk:
  topics:
    scoreUpdated: risk.score.updated
    breached: risk.breached
    anomalyDetected: risk.anomaly.detected
    recommendationCreated: risk.recommendation.created
    stressTestCompleted: risk.stress_test.completed
    scenarioCompleted: risk.scenario.completed
    concentrationAnalyzed: risk.concentration.analyzed
    drawdownAnalyzed: risk.drawdown.analyzed

surveillance:
  kafkaTopics:
    - order.created
    - order.filled
    - order.cancelled
    - portfolio.updated
    - risk.score.updated
    - market.ticks
    - strategy.signal.generated
  ruleConfigCacheTtlSeconds: "60"
  rules:
    largeOrderThreshold: "100000"
    rapidOrderLimit: "5"
    rapidOrderWindowSeconds: "60"
    highCancelLimit: "3"
    highCancelWindowSeconds: "300"
    riskScoreThreshold: "80"
    abnormalPriceMovementPercent: "10"

notification:
  kafkaTopics:
    - surveillance.alert.created
    - surveillance.alert.acknowledged
    - surveillance.alert.resolved
    - surveillance.alert.dismissed
  webhook:
    timeoutSeconds: "3"
    maxRetries: "3"

audit:
  kafkaGroupId: audit-service
  kafkaTopics:
    - user.registered
    - user.login
    - user.logout
    - order.created
    - order.cancelled
    - order.filled
    - portfolio.updated
    - risk.score.updated
    - risk.breached
    - surveillance.alert.created
    - surveillance.alert.acknowledged
    - surveillance.alert.resolved
    - surveillance.alert.dismissed
    - notification.read
    - notification.failed
    - notification.sent
    - notification.retry_requested

frontend:
  runtimeConfig:
    apiBaseUrl: http://localhost:8080
    wsBaseUrl: ws://localhost:8080
    grafanaUrl: http://localhost:3000
    jaegerUrl: http://localhost:16686
    prometheusUrl: http://localhost:9090

otel:
  enabled: "true"
  exporterOtlpEndpoint: http://tradeops-otel-collector:4318
  serviceVersion: "3.0.0"
  tracesSampler: parentbased_traceidratio
  tracesSamplerArg: "1.0"
  collector:
    enabled: false
    image: otel/opentelemetry-collector-contrib:0.104.0
    replicaCount: 1
    memoryLimitMiB: 256
    exporterEndpoint: http://jaeger:4318
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

observability:
  prometheus:
    annotations:
      enabled: true
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  tls: []
  routes:
    - name: api
      enabled: true
      host: api.tradeops.local
      paths:
        - path: /
          serviceName: api-gateway
          servicePort: 8080
    - name: angular
      enabled: true
      host: app.tradeops.local
      paths:
        - path: /
          serviceName: shell-angular
          servicePort: 8080
    - name: dashboard
      enabled: true
      host: dashboard.tradeops.local
      paths:
        - path: /
          serviceName: trading-dashboard-react
          servicePort: 8080

networkPolicies:
  enabled: false
  defaultDenyIngress: false
  defaultDenyEgress: false
  allowExternalEgress: true

migrations:
  enabled: true
  useHelmHook: false
  image: postgres:16.2
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

seed:
  enabled: false
  image: postgres:16.2
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

tests:
  enabled: true
  image: busybox:1.36.1

applications:
  apiGateway:
    enabled: true
    name: api-gateway
    serviceName: api-gateway
    replicaCount: 1
    containerPort: 8080
    image:
      registry: ""
      repository: tradeops/api-gateway
      tag: 0.1.0
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8080
    serviceAccount:
      create: true
      automountServiceAccountToken: false
    env:
      NODE_ENV: production
      PORT: "8080"
      LOG_LEVEL: info
      IDENTITY_SERVICE_URL: http://identity-service:8080
      MARKET_DATA_SERVICE_URL: http://market-data-service:8080
      ORDER_SERVICE_URL: http://order-service:8080
      PORTFOLIO_SERVICE_URL: http://portfolio-service:8080
      STRATEGY_SERVICE_URL: http://strategy-service:8080
      RISK_SERVICE_URL: http://risk-engine-service:8080
      SURVEILLANCE_SERVICE_URL: http://surveillance-service:8090
      NOTIFICATION_SERVICE_URL: http://notification-service:8091
      AUDIT_SERVICE_URL: http://audit-service:8092
      WS_KAFKA_BROKERS: "{{ include \"tradeops.kafkaBrokers\" . }}"
    configMapEnv:
      CORS_ORIGIN: CORS_ORIGIN
      WS_ALLOWED_ORIGINS: WS_ALLOWED_ORIGINS
      PROXY_TIMEOUT_MS: PROXY_TIMEOUT_MS
      REQUEST_BODY_LIMIT: REQUEST_BODY_LIMIT
      RATE_LIMIT_WINDOW_MS: RATE_LIMIT_WINDOW_MS
      RATE_LIMIT_MAX_REQUESTS: RATE_LIMIT_MAX_REQUESTS
      ADMIN_API_ENABLED: ADMIN_API_ENABLED
      ADMIN_HEALTH_TIMEOUT_MS: ADMIN_HEALTH_TIMEOUT_MS
      ADMIN_SERVICE_REGISTRY_MODE: ADMIN_SERVICE_REGISTRY_MODE
      WS_ENABLED: WS_ENABLED
      WS_REQUIRE_AUTH: WS_REQUIRE_AUTH
      WS_KAFKA_GROUP_ID: WS_KAFKA_GROUP_ID
      WS_MAX_CONNECTIONS: WS_MAX_CONNECTIONS
      WS_HEARTBEAT_INTERVAL_MS: WS_HEARTBEAT_INTERVAL_MS
      OTEL_ENABLED: OTEL_ENABLED
      OTEL_EXPORTER_OTLP_ENDPOINT: OTEL_EXPORTER_OTLP_ENDPOINT
      OTEL_SERVICE_VERSION: OTEL_SERVICE_VERSION
      OTEL_TRACES_SAMPLER: OTEL_TRACES_SAMPLER
      OTEL_TRACES_SAMPLER_ARG: OTEL_TRACES_SAMPLER_ARG
    secretEnv: {}
    probes: &defaultProbes
      enabled: true
      liveness: { path: /health, initialDelaySeconds: 20, periodSeconds: 10, timeoutSeconds: 5, failureThreshold: 5 }
      readiness: { path: /health, initialDelaySeconds: 5, periodSeconds: 10, timeoutSeconds: 5, failureThreshold: 3 }
      startup: { path: /health, periodSeconds: 5, timeoutSeconds: 5, failureThreshold: 30 }
    metrics: &defaultMetrics
      enabled: true
      path: /metrics
    resources: &apiResources
      requests: { cpu: 100m, memory: 128Mi }
      limits: { cpu: 500m, memory: 512Mi }
    autoscaling: &defaultAutoscaling
      enabled: false
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: null
      behavior: {}
    podDisruptionBudget: &defaultPdb
      enabled: false
      maxUnavailable: 1
      minAvailable: null
    rollingUpdate: &defaultRolling
      maxUnavailable: "25%"
      maxSurge: "25%"
    runtimeConfigMount: &noRuntimeConfig
      enabled: false
      mountPath: /usr/share/nginx/html/config
    emptyDirMounts:
      - name: tmp
        mountPath: /tmp

  identityService:
    enabled: true
    name: identity-service
    serviceName: identity-service
    replicaCount: 1
    containerPort: 8080
    image: { registry: "", repository: tradeops/identity-service, tag: 0.2.0, pullPolicy: IfNotPresent }
    service: { type: ClusterIP, port: 8080 }
    serviceAccount: { create: true, automountServiceAccountToken: false }
    env:
      IDENTITY_SERVICE_PORT: "8080"
      IDENTITY_DATABASE_URL: "postgres://tradeops:$(POSTGRES_PASSWORD)@{{ include \"tradeops.postgresqlHost\" . }}:5432/tradeops?sslmode=disable"
      IDENTITY_REDIS_ADDR: "{{ include \"tradeops.redisHost\" . }}:6379"
      IDENTITY_ACCESS_TOKEN_TTL_MINUTES: "15"
      IDENTITY_REFRESH_TOKEN_TTL_HOURS: "24"
    configMapEnv: {}
    secretEnv:
      IDENTITY_JWT_SECRET: JWT_SECRET
      IDENTITY_REFRESH_TOKEN_SECRET: IDENTITY_REFRESH_TOKEN_SECRET
    probes: *defaultProbes
    metrics: *defaultMetrics
    resources: *apiResources
    autoscaling: *defaultAutoscaling
    podDisruptionBudget: *defaultPdb
    rollingUpdate: *defaultRolling
    runtimeConfigMount: *noRuntimeConfig
    emptyDirMounts: [{ name: tmp, mountPath: /tmp }]

  marketDataService:
    enabled: true
    name: market-data-service
    serviceName: market-data-service
    replicaCount: 1
    containerPort: 8080
    image: { registry: "", repository: tradeops/market-data-service, tag: 0.3.0, pullPolicy: IfNotPresent }
    service: { type: ClusterIP, port: 8080 }
    serviceAccount: { create: true, automountServiceAccountToken: false }
    env:
      MARKET_DATA_SERVICE_PORT: "8080"
      MARKET_DATA_DATABASE_URL: "postgres://tradeops:$(POSTGRES_PASSWORD)@{{ include \"tradeops.postgresqlHost\" . }}:5432/tradeops?sslmode=disable"
      MARKET_DATA_MQTT_BROKER: "{{ include \"tradeops.mqttBroker\" . }}"
      MARKET_DATA_KAFKA_BROKERS: "{{ include \"tradeops.kafkaBrokers\" . }}"
    configMapEnv:
      MARKET_DATA_MQTT_TOPIC: MARKET_DATA_MQTT_TOPIC
      MARKET_DATA_KAFKA_TOPIC: MARKET_DATA_KAFKA_TOPIC
      MARKET_SIMULATOR_ENABLED: MARKET_SIMULATOR_ENABLED
      MARKET_SIMULATOR_INTERVAL_MS: MARKET_SIMULATOR_INTERVAL_MS
    secretEnv: {}
    probes: *defaultProbes
    metrics: *defaultMetrics
    resources: *apiResources
    autoscaling: *defaultAutoscaling
    podDisruptionBudget: *defaultPdb
    rollingUpdate: *defaultRolling
    runtimeConfigMount: *noRuntimeConfig
    emptyDirMounts: [{ name: tmp, mountPath: /tmp }]

  orderService:
    enabled: true
    name: order-service
    serviceName: order-service
    replicaCount: 1
    containerPort: 8080
    image: { registry: "", repository: tradeops/order-service, tag: 0.4.0, pullPolicy: IfNotPresent }
    service: { type: ClusterIP, port: 8080 }
    serviceAccount: { create: true, automountServiceAccountToken: false }
    env:
      ORDER_SERVICE_PORT: "8080"
      ORDER_DATABASE_URL: "postgres://tradeops:$(POSTGRES_PASSWORD)@{{ include \"tradeops.postgresqlHost\" . }}:5432/tradeops?sslmode=disable"
      ORDER_KAFKA_BROKERS: "{{ include \"tradeops.kafkaBrokers\" . }}"
    configMapEnv:
      OTEL_ENABLED: OTEL_ENABLED
      OTEL_EXPORTER_OTLP_ENDPOINT: OTEL_EXPORTER_OTLP_ENDPOINT
      OTEL_SERVICE_VERSION: OTEL_SERVICE_VERSION
      OTEL_TRACES_SAMPLER: OTEL_TRACES_SAMPLER
      OTEL_TRACES_SAMPLER_ARG: OTEL_TRACES_SAMPLER_ARG
    secretEnv:
      ORDER_JWT_SECRET: JWT_SECRET
    probes: *defaultProbes
    metrics: *defaultMetrics
    resources: *apiResources
    autoscaling: *defaultAutoscaling
    podDisruptionBudget: *defaultPdb
    rollingUpdate: *defaultRolling
    runtimeConfigMount: *noRuntimeConfig
    emptyDirMounts: [{ name: tmp, mountPath: /tmp }]

  portfolioService:
    enabled: true
    name: portfolio-service
    serviceName: portfolio-service
    replicaCount: 1
    containerPort: 8080
    image: { registry: "", repository: tradeops/portfolio-service, tag: 0.5.0, pullPolicy: IfNotPresent }
    service: { type: ClusterIP, port: 8080 }
    serviceAccount: { create: true, automountServiceAccountToken: false }
    env:
      PORTFOLIO_SERVICE_PORT: "8080"
      PORTFOLIO_DATABASE_URL: "postgres://tradeops:$(POSTGRES_PASSWORD)@{{ include \"tradeops.postgresqlHost\" . }}:5432/tradeops?sslmode=disable"
      PORTFOLIO_KAFKA_BROKERS: "{{ include \"tradeops.kafkaBrokers\" . }}"
    configMapEnv:
      PORTFOLIO_ORDER_FILLED_TOPIC: PORTFOLIO_ORDER_FILLED_TOPIC
      PORTFOLIO_UPDATED_TOPIC: PORTFOLIO_UPDATED_TOPIC
      PORTFOLIO_SNAPSHOT_TOPIC: PORTFOLIO_SNAPSHOT_TOPIC
      PORTFOLIO_INITIAL_CASH: PORTFOLIO_INITIAL_CASH
      EVENT_PROCESSING_MAX_RETRIES: EVENT_PROCESSING_MAX_RETRIES
      EVENT_PROCESSING_RETRY_BACKOFF_MS: EVENT_PROCESSING_RETRY_BACKOFF_MS
      EVENT_PROCESSING_RETRY_BACKOFF_MULTIPLIER: EVENT_PROCESSING_RETRY_BACKOFF_MULTIPLIER
    secretEnv:
      PORTFOLIO_JWT_SECRET: JWT_SECRET
    probes: *defaultProbes
    metrics: *defaultMetrics
    resources: *apiResources
    autoscaling: *defaultAutoscaling
    podDisruptionBudget: *defaultPdb
    rollingUpdate: *defaultRolling
    runtimeConfigMount: *noRuntimeConfig
    emptyDirMounts: [{ name: tmp, mountPath: /tmp }]

  strategyService:
    enabled: true
    name: strategy-service
    serviceName: strategy-service
    replicaCount: 1
    containerPort: 8080
    image: { registry: "", repository: tradeops/strategy-service, tag: 0.6.0, pullPolicy: IfNotPresent }
    service: { type: ClusterIP, port: 8080 }
    serviceAccount: { create: true, automountServiceAccountToken: false }
    env:
      STRATEGY_SERVICE_PORT: "8080"
      STRATEGY_DATABASE_URL: "postgresql+psycopg://tradeops:$(POSTGRES_PASSWORD)@{{ include \"tradeops.postgresqlHost\" . }}:5432/tradeops"
      STRATEGY_KAFKA_BROKERS: "{{ include \"tradeops.kafkaBrokers\" . }}"
    configMapEnv:
      STRATEGY_SIGNAL_TOPIC: STRATEGY_SIGNAL_TOPIC
      STRATEGY_BACKTEST_COMPLETED_TOPIC: STRATEGY_BACKTEST_COMPLETED_TOPIC
    secretEnv:
      STRATEGY_JWT_SECRET: JWT_SECRET
    probes: *defaultProbes
    metrics: *defaultMetrics
    resources:
      requests: { cpu: 150m, memory: 256Mi }
      limits: { cpu: "1", memory: 1Gi }
    autoscaling: *defaultAutoscaling
    podDisruptionBudget: *defaultPdb
    rollingUpdate: *defaultRolling
    runtimeConfigMount: *noRuntimeConfig
    emptyDirMounts: [{ name: tmp, mountPath: /tmp }]

  riskEngineService:
    enabled: true
    name: risk-engine-service
    serviceName: risk-engine-service
    replicaCount: 1
    containerPort: 8080
    image: { registry: "", repository: tradeops/risk-engine-service, tag: 0.7.0, pullPolicy: IfNotPresent }
    service: { type: ClusterIP, port: 8080 }
    serviceAccount: { create: true, automountServiceAccountToken: false }
    env:
      RISK_SERVICE_PORT: "8080"
      RISK_DATABASE_URL: "postgresql+psycopg://tradeops:$(POSTGRES_PASSWORD)@{{ include \"tradeops.postgresqlHost\" . }}:5432/tradeops"
      RISK_KAFKA_BROKERS: "{{ include \"tradeops.kafkaBrokers\" . }}"
    configMapEnv:
      RISK_SCORE_UPDATED_TOPIC: RISK_SCORE_UPDATED_TOPIC
      RISK_BREACHED_TOPIC: RISK_BREACHED_TOPIC
      RISK_ANOMALY_TOPIC: RISK_ANOMALY_TOPIC
      RISK_RECOMMENDATION_TOPIC: RISK_RECOMMENDATION_TOPIC
      RISK_STRESS_TEST_COMPLETED_TOPIC: RISK_STRESS_TEST_COMPLETED_TOPIC
      RISK_SCENARIO_COMPLETED_TOPIC: RISK_SCENARIO_COMPLETED_TOPIC
      RISK_CONCENTRATION_ANALYZED_TOPIC: RISK_CONCENTRATION_ANALYZED_TOPIC
      RISK_DRAWDOWN_ANALYZED_TOPIC: RISK_DRAWDOWN_ANALYZED_TOPIC
    secretEnv:
      RISK_JWT_SECRET: JWT_SECRET
    probes: *defaultProbes
    metrics: *defaultMetrics
    resources:
      requests: { cpu: 200m, memory: 384Mi }
      limits: { cpu: "1", memory: 1Gi }
    autoscaling: *defaultAutoscaling
    podDisruptionBudget: *defaultPdb
    rollingUpdate: *defaultRolling
    runtimeConfigMount: *noRuntimeConfig
    emptyDirMounts: [{ name: tmp, mountPath: /tmp }]

  surveillanceService:
    enabled: true
    name: surveillance-service
    serviceName: surveillance-service
    replicaCount: 1
    containerPort: 8090
    image: { registry: "", repository: tradeops/surveillance-service, tag: 0.8.0, pullPolicy: IfNotPresent }
    service: { type: ClusterIP, port: 8090 }
    serviceAccount: { create: true, automountServiceAccountToken: false }
    env:
      SURVEILLANCE_SERVICE_PORT: "8090"
      SURVEILLANCE_DATABASE_URL: "postgres://tradeops:$(POSTGRES_PASSWORD)@{{ include \"tradeops.postgresqlHost\" . }}:5432/tradeops?sslmode=disable"
      SURVEILLANCE_KAFKA_BROKERS: "{{ include \"tradeops.kafkaBrokers\" . }}"
    configMapEnv:
      SURVEILLANCE_KAFKA_TOPICS: SURVEILLANCE_KAFKA_TOPICS
      SURVEILLANCE_LARGE_ORDER_THRESHOLD: SURVEILLANCE_LARGE_ORDER_THRESHOLD
      SURVEILLANCE_RAPID_ORDER_LIMIT: SURVEILLANCE_RAPID_ORDER_LIMIT
      SURVEILLANCE_RAPID_ORDER_WINDOW_SECONDS: SURVEILLANCE_RAPID_ORDER_WINDOW_SECONDS
      SURVEILLANCE_HIGH_CANCEL_LIMIT: SURVEILLANCE_HIGH_CANCEL_LIMIT
      SURVEILLANCE_HIGH_CANCEL_WINDOW_SECONDS: SURVEILLANCE_HIGH_CANCEL_WINDOW_SECONDS
      SURVEILLANCE_RISK_SCORE_THRESHOLD: SURVEILLANCE_RISK_SCORE_THRESHOLD
      SURVEILLANCE_ABNORMAL_PRICE_MOVEMENT_PERCENT: SURVEILLANCE_ABNORMAL_PRICE_MOVEMENT_PERCENT
      SURVEILLANCE_RULE_CONFIG_CACHE_TTL_SECONDS: SURVEILLANCE_RULE_CONFIG_CACHE_TTL_SECONDS
      EVENT_PROCESSING_MAX_RETRIES: EVENT_PROCESSING_MAX_RETRIES
      EVENT_PROCESSING_RETRY_BACKOFF_MS: EVENT_PROCESSING_RETRY_BACKOFF_MS
      EVENT_PROCESSING_RETRY_BACKOFF_MULTIPLIER: EVENT_PROCESSING_RETRY_BACKOFF_MULTIPLIER
      OTEL_ENABLED: OTEL_ENABLED
      OTEL_EXPORTER_OTLP_ENDPOINT: OTEL_EXPORTER_OTLP_ENDPOINT
      OTEL_SERVICE_VERSION: OTEL_SERVICE_VERSION
      OTEL_TRACES_SAMPLER: OTEL_TRACES_SAMPLER
      OTEL_TRACES_SAMPLER_ARG: OTEL_TRACES_SAMPLER_ARG
    secretEnv:
      SURVEILLANCE_JWT_SECRET: JWT_SECRET
    probes: *defaultProbes
    metrics: *defaultMetrics
    resources: *apiResources
    autoscaling: *defaultAutoscaling
    podDisruptionBudget: *defaultPdb
    rollingUpdate: *defaultRolling
    runtimeConfigMount: *noRuntimeConfig
    emptyDirMounts: [{ name: tmp, mountPath: /tmp }]

  notificationService:
    enabled: true
    name: notification-service
    serviceName: notification-service
    replicaCount: 1
    containerPort: 8091
    image: { registry: "", repository: tradeops/notification-service, tag: 0.9.0, pullPolicy: IfNotPresent }
    service: { type: ClusterIP, port: 8091 }
    serviceAccount: { create: true, automountServiceAccountToken: false }
    env:
      NOTIFICATION_SERVICE_PORT: "8091"
      NOTIFICATION_DATABASE_URL: "postgres://tradeops:$(POSTGRES_PASSWORD)@{{ include \"tradeops.postgresqlHost\" . }}:5432/tradeops?sslmode=disable"
      NOTIFICATION_KAFKA_BROKERS: "{{ include \"tradeops.kafkaBrokers\" . }}"
    configMapEnv:
      NOTIFICATION_KAFKA_TOPICS: NOTIFICATION_KAFKA_TOPICS
      NOTIFICATION_WEBHOOK_TIMEOUT_SECONDS: NOTIFICATION_WEBHOOK_TIMEOUT_SECONDS
      NOTIFICATION_WEBHOOK_MAX_RETRIES: NOTIFICATION_WEBHOOK_MAX_RETRIES
      EVENT_PROCESSING_MAX_RETRIES: EVENT_PROCESSING_MAX_RETRIES
      EVENT_PROCESSING_RETRY_BACKOFF_MS: EVENT_PROCESSING_RETRY_BACKOFF_MS
      EVENT_PROCESSING_RETRY_BACKOFF_MULTIPLIER: EVENT_PROCESSING_RETRY_BACKOFF_MULTIPLIER
      OTEL_ENABLED: OTEL_ENABLED
      OTEL_EXPORTER_OTLP_ENDPOINT: OTEL_EXPORTER_OTLP_ENDPOINT
      OTEL_SERVICE_VERSION: OTEL_SERVICE_VERSION
      OTEL_TRACES_SAMPLER: OTEL_TRACES_SAMPLER
      OTEL_TRACES_SAMPLER_ARG: OTEL_TRACES_SAMPLER_ARG
    secretEnv:
      NOTIFICATION_JWT_SECRET: JWT_SECRET
    probes: *defaultProbes
    metrics: *defaultMetrics
    resources: *apiResources
    autoscaling: *defaultAutoscaling
    podDisruptionBudget: *defaultPdb
    rollingUpdate: *defaultRolling
    runtimeConfigMount: *noRuntimeConfig
    emptyDirMounts: [{ name: tmp, mountPath: /tmp }]

  auditService:
    enabled: true
    name: audit-service
    serviceName: audit-service
    replicaCount: 1
