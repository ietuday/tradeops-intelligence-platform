{{- if .Values.seed.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "tradeops.fullname" . }}-db-seed
  namespace: {{ include "tradeops.namespace" . }}
  labels:
    {{- include "tradeops.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-seed
spec:
  backoffLimit: {{ .Values.seed.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.seed.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "tradeops.labels" . | nindent 8 }}
        app.kubernetes.io/component: db-seed
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      containers:
        - name: db-seed
          image: {{ .Values.seed.image | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "tradeops.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "tradeops.configName" . }}
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "tradeops.configName" . }}
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "tradeops.configName" . }}
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "tradeops.configName" . }}
                  key: POSTGRES_USER
          command:
            - /bin/sh
            - -ec
            - |
              echo "Running local/demo seed scripts"
              for file in /seeds/*.sql; do
                echo "Applying ${file}"
                psql -v ON_ERROR_STOP=1 \
                  -h "${POSTGRES_HOST}" \
                  -p "${POSTGRES_PORT}" \
                  -U "${POSTGRES_USER}" \
                  -d "${POSTGRES_DB}" \
                  -f "${file}"
              done
          resources:
            {{- toYaml .Values.seed.resources | nindent 12 }}
          volumeMounts:
            - name: seeds
              mountPath: /seeds
              readOnly: true
      volumes:
        - name: seeds
          configMap:
            name: {{ include "tradeops.fullname" . }}-db-seeds
{{- end }}

