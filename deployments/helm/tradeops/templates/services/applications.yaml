{{- range $key, $app := .Values.applications }}
{{- if $app.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $app.serviceName }}
  namespace: {{ include "tradeops.namespace" $ }}
  labels:
    {{- include "tradeops.componentLabels" (dict "root" $ "component" $app) | nindent 4 }}
spec:
  type: {{ default "ClusterIP" $app.service.type }}
  ports:
    - name: http
      port: {{ $app.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "tradeops.componentSelectorLabels" (dict "root" $ "component" $app) | nindent 4 }}
{{- end }}
{{- end }}

