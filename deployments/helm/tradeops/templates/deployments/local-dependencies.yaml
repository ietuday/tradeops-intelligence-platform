{{- if eq .Values.postgresql.mode "local" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tradeops.fullname" . }}-postgresql
  namespace: {{ include "tradeops.namespace" . }}
  labels:
    {{- include "tradeops.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
    tradeops.io/dependency-mode: local-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "tradeops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  template:
    metadata:
      labels:
        {{- include "tradeops.labels" . | nindent 8 }}
        app.kubernetes.io/component: postgresql
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgresql
          image: {{ .Values.postgresql.local.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "tradeops.secretName" . }}
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.auth.username | quote }}, "-d", {{ .Values.postgresql.auth.database | quote }}]
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.auth.username | quote }}, "-d", {{ .Values.postgresql.auth.database | quote }}]
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.postgresql.local.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
{{- end }}

{{- if eq .Values.redis.mode "local" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tradeops.fullname" . }}-redis
  namespace: {{ include "tradeops.namespace" . }}
  labels:
    {{- include "tradeops.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
    tradeops.io/dependency-mode: local-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "tradeops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "tradeops.labels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: {{ .Values.redis.local.image | quote }}
          args: ["redis-server", "--appendonly", "yes"]
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
          resources:
            {{- toYaml .Values.redis.local.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
{{- end }}

{{- if eq .Values.kafka.mode "local" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tradeops.fullname" . }}-redpanda
  namespace: {{ include "tradeops.namespace" . }}
  labels:
    {{- include "tradeops.labels" . | nindent 4 }}
    app.kubernetes.io/component: redpanda
    tradeops.io/dependency-mode: local-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "tradeops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redpanda
  template:
    metadata:
      labels:
        {{- include "tradeops.labels" . | nindent 8 }}
        app.kubernetes.io/component: redpanda
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redpanda
          image: {{ .Values.kafka.local.image | quote }}
          command:
            - rpk
            - redpanda
            - start
            - --mode=dev-container
            - --kafka-addr=internal://0.0.0.0:9092
            - --advertise-kafka-addr=internal://{{ include "tradeops.fullname" . }}-redpanda:9092
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            capabilities:
              drop:
                - ALL
          ports:
            - name: kafka
              containerPort: 9092
          resources:
            {{- toYaml .Values.kafka.local.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda
      volumes:
        - name: data
          emptyDir: {}
{{- end }}

{{- if eq .Values.mqtt.mode "local" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tradeops.fullname" . }}-mosquitto-config
  namespace: {{ include "tradeops.namespace" . }}
  labels:
    {{- include "tradeops.labels" . | nindent 4 }}
    app.kubernetes.io/component: mosquitto
    tradeops.io/dependency-mode: local-demo
data:
  mosquitto.conf: |
    listener 1883 0.0.0.0
    allow_anonymous true
    persistence false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tradeops.fullname" . }}-mosquitto
  namespace: {{ include "tradeops.namespace" . }}
  labels:
    {{- include "tradeops.labels" . | nindent 4 }}
    app.kubernetes.io/component: mosquitto
    tradeops.io/dependency-mode: local-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "tradeops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mosquitto
  template:
    metadata:
      labels:
        {{- include "tradeops.labels" . | nindent 8 }}
        app.kubernetes.io/component: mosquitto
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1883
        runAsGroup: 1883
        fsGroup: 1883
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mosquitto
          image: {{ .Values.mqtt.local.image | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1883
            runAsGroup: 1883
            capabilities:
              drop:
                - ALL
          ports:
            - name: mqtt
              containerPort: 1883
          resources:
            {{- toYaml .Values.mqtt.local.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
              readOnly: true
            - name: data
              mountPath: /mosquitto/data
            - name: log
              mountPath: /mosquitto/log
      volumes:
        - name: config
          configMap:
            name: {{ include "tradeops.fullname" . }}-mosquitto-config
        - name: data
          emptyDir: {}
        - name: log
          emptyDir: {}
{{- end }}
