{{- if and .Values.secrets.create .Values.secrets.allowInlineValues }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tradeops.secretName" . }}
  namespace: {{ include "tradeops.namespace" . }}
  labels:
    {{- include "tradeops.labels" . | nindent 4 }}
    tradeops.io/secret-mode: development-inline
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "secrets.inline.POSTGRES_PASSWORD is required when inline secret creation is enabled" .Values.secrets.inline.POSTGRES_PASSWORD | quote }}
  JWT_SECRET: {{ required "secrets.inline.JWT_SECRET is required when inline secret creation is enabled" .Values.secrets.inline.JWT_SECRET | quote }}
  IDENTITY_JWT_SECRET: {{ required "secrets.inline.JWT_SECRET is required when inline secret creation is enabled" .Values.secrets.inline.JWT_SECRET | quote }}
  IDENTITY_REFRESH_TOKEN_SECRET: {{ required "secrets.inline.IDENTITY_REFRESH_TOKEN_SECRET is required when inline secret creation is enabled" .Values.secrets.inline.IDENTITY_REFRESH_TOKEN_SECRET | quote }}
  GRAFANA_ADMIN_PASSWORD: {{ .Values.secrets.inline.GRAFANA_ADMIN_PASSWORD | quote }}
{{- end }}

