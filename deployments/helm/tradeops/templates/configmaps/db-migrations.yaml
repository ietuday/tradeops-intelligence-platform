{{- if .Values.migrations.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tradeops.fullname" . }}-db-migrations
  namespace: {{ include "tradeops.namespace" . }}
  labels:
    {{- include "tradeops.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-migrate
data:
{{ (.Files.Glob "files/database/migrations/*.sql").AsConfig | indent 2 }}
{{- end }}

