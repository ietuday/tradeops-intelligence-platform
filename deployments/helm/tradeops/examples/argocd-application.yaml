apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tradeops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ietuday/tradeops-intelligence-platform.git
    targetRevision: main
    path: deployments/helm/tradeops
    helm:
      valueFiles:
        - values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: tradeops
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

