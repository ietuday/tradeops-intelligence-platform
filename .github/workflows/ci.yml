name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  api-gateway-tests:
    name: API Gateway tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/api-gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build if available
        run: |
          if node -e "process.exit(require('./package.json').scripts?.build ? 0 : 1)"; then
            npm run build
          else
            echo "No build script found; skipping."
          fi

      - name: Lint if available
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No lint script found; skipping."
          fi

  go-services-tests:
    name: Go tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - identity-service
          - market-data-service
          - order-service
          - portfolio-service
          - surveillance-service
          - notification-service
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test ./...

  python-services-tests:
    name: Python tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - strategy-service
          - risk-engine-service
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies if present
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
          else
            echo "No requirements.txt found; skipping dependency install."
          fi

      - name: Run pytest if tests exist
        run: |
          if [ -d tests ] && find tests -name 'test_*.py' -print -quit | grep -q .; then
            python -m pytest
          else
            echo "No Python tests found; skipping."
          fi

  scripts-validation:
    name: Validate shell scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax checks
        run: |
          bash -n scripts/run-load-tests.sh
          bash -n scripts/perf-smoke.sh
          bash -n scripts/security-check.sh
          bash -n scripts/smoke-test.sh
          bash -n scripts/demo-surveillance.sh
          bash -n scripts/demo-notifications.sh
          bash -n scripts/demo-e2e-tradeops.sh
          bash -n scripts/demo-reliability.sh
          bash -n scripts/demo-audit.sh
          bash -n scripts/demo-observability.sh
          bash -n scripts/demo-correlation-tracing.sh
          bash -n scripts/db-backup.sh
          bash -n scripts/db-restore.sh
          bash -n scripts/archive-old-data.sh
          bash -n scripts/replay-sample-events.sh
          bash -n scripts/replay-dlq-events.sh
          bash -n scripts/validate-helm.sh

  docker-compose-config:
    name: Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose configuration
        run: docker compose -f infrastructure/docker/docker-compose.yml config

  helm-validation:
    name: Optional Helm validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Validate Helm chart
        run: ./scripts/validate-helm.sh
